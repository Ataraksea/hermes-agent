services:
  desktop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-desktop
    restart: unless-stopped
    ports:
      - "${TERMINAL_SSH_PORT:-2222}:22"
      - "${VNC_PORT:-5901}:5901"
      - "${NOVNC_PORT:-6080}:6080"
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-hermes}
      HERMES_PASSWORD: ${HERMES_PASSWORD:-hermes}
      AUTHORIZED_KEYS: ${AUTHORIZED_KEYS:-}
      VNC_RESOLUTION: ${VNC_RESOLUTION:-1920x1080}
    healthcheck:
      test: ["CMD-SHELL", "su - hermes -c 'env HOME=/home/hermes DISPLAY=:1 XAUTHORITY=/home/hermes/.Xauthority /usr/bin/xdotool getdisplaygeometry >/dev/null 2>&1'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - desktop_home:/home/hermes
      - desktop_screenshots:/home/hermes/.hermes/cache/computer_screenshots

volumes:
  desktop_home:
  desktop_screenshots:
